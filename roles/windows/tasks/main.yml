---
# tasks file for windows

- name: Modify Windows Registry Keys
  ansible.windows.win_regedit:
    key: "{{ item.key }}"
    value: "{{ item.value }}"
    data: "{{ item.data }}"
    datatype: "{{ item.datatype }}"
  loop:
    # Enable Clipboard History
    - key: HKCU:\SOFTWARE\Microsoft\Clipboard
      value: EnableClipboardHistory
      data: 1
      datatype: dword

    # Show Hidden Files
    - key: HKCU:\SOFTWARE\Microsoft\Windows\CurrentVersion\Explorer\Advanced
      value: Hidden
      data: 1
      datatype: dword

    # Disable "Hide File Extensions"
    - key: HKCU:\SOFTWARE\Microsoft\Windows\CurrentVersion\Explorer\Advanced
      value: HideFileExt
      data: 0
      datatype: dword

    # Enable Developer Mode
    - key: HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\AppModelUnlock
      value: AllowDevelopmentWithoutDevLicense
      data: 1
      datatype: dword

    # Enable Sudo Functionality (custom configuration)
    - key: HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Sudo
      value: Enabled
      data: 1
      datatype: dword

    # Ensure "Show Frequent Items" is disabled
    - key: HKCU:\SOFTWARE\Microsoft\Windows\CurrentVersion\Explorer
      value: ShowFrequent
      data: 0
      datatype: dword

    # Ensure "Show Recent Items" is disabled
    - key: HKCU:\SOFTWARE\Microsoft\Windows\CurrentVersion\Explorer
      value: ShowRecent
      data: 0
      datatype: dword

    # Enable Long Path Support
    - key: HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem
      value: LongPathEnabled
      data: 1
      datatype: dword

# TODO: Future Improvements
# - Hide Taskbar Widgets and Task View
# - Disable Window Snap features
# - Additional optimizations from:
#   https://qiita.com/Oscer/items/132a8153cc5dcf0fad47

- name: Copy .gitconfig template to user home
  ansible.builtin.template:
    src: .gitconfig.j2
    dest: "~/.gitconfig"

- name: Get list of installed winget package IDs
  # winget list outputs a fixed-width table where Name column can contain spaces,
  # so we parse column positions from the header line to extract Id accurately.
  ansible.windows.win_shell: |
    $exe = Join-Path (Get-AppxPackage Microsoft.DesktopAppInstaller).InstallLocation "winget.exe"
    $output = & $exe list --accept-source-agreements 2>$null
    $headerLine = $output | Where-Object { $_ -match '^Name\s+Id\s+Version' }
    if ($headerLine) {
      $idStart = $headerLine.IndexOf('Id')
      $verStart = $headerLine.IndexOf('Version')
      $output | ForEach-Object {
        if ($_.Length -ge $verStart) {
          $_.Substring($idStart, $verStart - $idStart).Trim()
        }
      }
    }
  register: winget_installed
  changed_when: false

- name: Install missing winget packages
  ansible.windows.win_shell: |
    $exe = Join-Path (Get-AppxPackage Microsoft.DesktopAppInstaller).InstallLocation "winget.exe"
    & $exe install --id "{{ item }}" --exact --accept-source-agreements --accept-package-agreements
    exit $LASTEXITCODE
  register: winget_install
  loop: "{{ winget_packages }}"
  when: item not in winget_installed.stdout_lines
  changed_when: winget_install.rc == 0 and 'already installed' not in winget_install.stdout
  failed_when: winget_install.rc != 0 and 'already installed' not in winget_install.stdout

- name: Configure firewall rules
  community.windows.win_firewall_rule:
    name: "{{ item.name }}"
    localport: "{{ item.localport }}"
    protocol: "{{ item.protocol }}"
    direction: in
    action: allow
    state: present
    enabled: true
  loop: "{{ win_firewall_rules }}"

- name: Ensure user-specific PATH variables
  ansible.windows.win_path:
    elements: "{{ win_path_user_elements }}"
    name: 'Path'
    scope: user

- name: Ensure system-wide PATH variables
  ansible.windows.win_path:
    elements: "{{ win_path_machine_elements }}"
    name: 'Path'
    scope: machine
